version: '3.8'

services:
  web:
    # Substitua pelo seu repositório real após o push no GitHub
    image: ghcr.io/${GITHUB_USERNAME}/${REPO_NAME}:latest
    container_name: dyad-app-web
    ports:
      - "3000:3000"
    volumes:
      - dyad_db_data:/app/data
    environment:
      NODE_ENV: production
      # Define o diretório onde o lowdb salvará o db.json
      DATABASE_DIR: "/app/data"
      # Chave de API para proteger o endpoint de webhook
      API_SECRET_KEY: "minha-chave-secreta-super-segura"
      # URLs opcionais para proxy de APIs externas
      # EXTERNAL_API_URL_SERVICE1: ""
      # EXTERNAL_API_URL_SERVICE2: ""
      # WEATHER_API_URL: ""
    restart: unless-stopped

volumes:
  dyad_db_data:
    driver: local